name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Test Python tools
        run: |
          python -m pip install -U pip
          for proj in file_hash_verifier log_summary ioc_text_extractor evidence_manifest_builder; do
            python -m pip install -e "python/${proj}[dev]"
            python -m pytest "python/${proj}/tests" -q
          done

  java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Test RBAC simulator
        working-directory: java/rbac-simulator
        run: mvn -B test
