name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Test file hash verifier
        run: |
          python -m pip install -U pip
          python -m pip install -e "python/file_hash_verifier[dev]"
          python -m pytest python/file_hash_verifier/tests -q
      - name: Test log summary
        run: |
          python -m pip install -e "python/log_summary[dev]"
          python -m pytest python/log_summary/tests -q

  java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Test RBAC simulator
        working-directory: java/rbac-simulator
        run: mvn -B test
